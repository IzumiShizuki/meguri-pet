<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meguri Desktop Pet</title>
  <style>
    :root { color-scheme: dark; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 70% 10%, #5b426e 0, #241d36 45%, #100e1b 100%); color: #f8eef9; }
    .shell { width: min(1120px, 100%); min-height: 100vh; margin: 0 auto; padding: 28px; display: grid; grid-template-columns: minmax(300px, 0.9fr) minmax(360px, 1.1fr); gap: 24px; align-items: center; }
    .stage, .chat { border: 1px solid #ffffff20; border-radius: 28px; background: #171323cc; box-shadow: 0 24px 90px #0007; backdrop-filter: blur(18px); }
    .stage { min-height: 680px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; }
    .brand { width: 100%; display: flex; justify-content: space-between; align-items: center; color: #e8c8ec; }
    .brand strong { font-size: 1.1rem; letter-spacing: .08em; }
    .status { font-size: .78rem; color: #b9efcd; border: 1px solid #b9efcd55; border-radius: 999px; padding: 6px 10px; }
    .status.busy { color: #f8d694; border-color: #f8d69466; }
    .sprite-wrap { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 18px 0; }
    #sprite { max-width: 100%; max-height: 500px; object-fit: contain; filter: drop-shadow(0 24px 20px #0008); }
    .expression { color: #d4b9db; font-size: .9rem; min-height: 24px; }
    .chat { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    h1 { margin: 0; font-size: clamp(1.7rem, 3vw, 2.5rem); }
    .subtitle { margin: 0; color: #c6b8d2; line-height: 1.65; }
    .bubble { min-height: 180px; padding: 18px; border-radius: 20px; background: #ffffff0b; border: 1px solid #ffffff14; line-height: 1.8; white-space: pre-wrap; }
    form { display: flex; gap: 10px; }
    input { flex: 1; min-width: 0; border: 1px solid #ffffff25; background: #0b0913aa; border-radius: 14px; padding: 14px; color: inherit; outline: none; font: inherit; }
    input:focus { border-color: #df9ce8; box-shadow: 0 0 0 3px #df9ce822; }
    button { border: 0; border-radius: 14px; padding: 0 20px; background: linear-gradient(135deg, #e7a5ec, #a873e2); color: #1a1020; font-weight: 700; cursor: pointer; font: inherit; }
    button:disabled { opacity: .5; cursor: wait; }
    .meta { display: flex; justify-content: space-between; color: #9386a1; font-size: .76rem; gap: 12px; }
    .error { color: #ffb4b4; min-height: 22px; font-size: .84rem; }
    body.overlay { background: transparent; }
    body.overlay .shell { width: 100%; min-height: 100vh; padding: 10px; display: block; }
    body.overlay .stage { min-height: 365px; height: 365px; padding: 12px; border-radius: 24px; background: #171323dd; }
    body.overlay #sprite { max-height: 275px; }
    body.overlay .chat { margin-top: 10px; padding: 12px; gap: 8px; border-radius: 18px; }
    body.overlay .chat > div:first-child, body.overlay .meta { display: none; }
    body.overlay .bubble { min-height: 48px; max-height: 110px; overflow: auto; padding: 10px; font-size: .86rem; }
    body.overlay form { gap: 6px; }
    body.overlay input { padding: 9px; font-size: .84rem; }
    body.overlay button { padding: 0 12px; font-size: .84rem; }
    @media (max-width: 800px) { .shell { grid-template-columns: 1fr; padding: 14px; } .stage { min-height: 480px; } #sprite { max-height: 330px; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="stage" aria-label="Meguri desktop pet">
      <div class="brand"><strong>MEGURI</strong><span id="status" class="status">Java runtime connecting…</span></div>
      <div class="sprite-wrap"><img id="sprite" src="/assets/sprites/meguri/ce04001l.png" alt="Meguri" /></div>
      <div id="expression" class="expression">neutral · low</div>
    </section>
    <section class="chat">
      <div>
        <h1>和 Meguri 说说话</h1>
        <p class="subtitle">这是本地桌宠主页。浏览器只访问 Java Meguri Core，DeepSeek key 保留在本机服务端。</p>
      </div>
      <div id="bubble" class="bubble">你好呀，我已经在这里等你了。</div>
      <form id="form">
        <input id="message" autocomplete="off" placeholder="输入消息…" maxlength="8000" />
        <button id="send" type="submit">发送</button>
      </form>
      <div id="error" class="error"></div>
      <div class="meta"><span id="build">build: checking…</span><span>session: local-browser</span></div>
    </section>
  </main>
  <script>
    if (new URLSearchParams(location.search).get('mode') === 'overlay') document.body.classList.add('overlay')
    const coreUrl = 'http://127.0.0.1:18080'
    const sessionId = 'desktop-home-' + Math.random().toString(36).slice(2)
    const userId = 'local-browser-user'
    const sprite = document.getElementById('sprite')
    const expression = document.getElementById('expression')
    const bubble = document.getElementById('bubble')
    const status = document.getElementById('status')
    const build = document.getElementById('build')
    const error = document.getElementById('error')
    const input = document.getElementById('message')
    const send = document.getElementById('send')
    let speechEnabled = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window

    function setStatus(text, busy = false) {
      status.textContent = text
      status.classList.toggle('busy', busy)
    }
    function applyExpression(data) {
      const tag = data.expression_tag || 'neutral'
      const intensity = data.expression_intensity || 'low'
      expression.textContent = tag + ' · ' + intensity + (data.outfit_code ? ' · outfit ' + data.outfit_code : '')
      if (data.sprite_file) sprite.src = '/assets/sprites/meguri/' + encodeURIComponent(data.sprite_file)
    }
    function speakText(text, voiceStyle) {
      if (!speechEnabled || !text) return
      try {
        window.speechSynthesis.cancel()
        const utterance = new SpeechSynthesisUtterance(text)
        utterance.lang = 'zh-CN'
        utterance.rate = voiceStyle === 'sleepy' ? 0.86 : voiceStyle === 'cheerful' ? 1.08 : 0.98
        utterance.pitch = voiceStyle === 'teasing' ? 1.12 : 1.0
        utterance.onstart = () => setStatus('正在播放语音…', true)
        utterance.onend = () => { if (!send.disabled) setStatus('Java + DeepSeek ready') }
        utterance.onerror = () => { speechEnabled = false; setStatus('文字回复已完成') }
        window.speechSynthesis.speak(utterance)
      } catch {
        speechEnabled = false
      }
    }
    function parseSseFrame(frame) {
      let eventName = ''
      const dataLines = []
      for (const line of frame.split(/\r?\n/)) {
        if (line.startsWith('event:')) eventName = line.slice(6).trim()
        else if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart())
      }
      if (!eventName || dataLines.length === 0) return undefined
      try { return { eventName, envelope: JSON.parse(dataLines.join('\n')) } } catch { return undefined }
    }
    async function followTurn(turnId) {
      const response = await fetch(coreUrl + '/v1/sessions/' + encodeURIComponent(sessionId) + '/events?after_sequence=0', {
        headers: { Accept: 'text/event-stream' },
      })
      if (!response.ok || !response.body) throw new Error('SSE ' + response.status)
      const reader = response.body.getReader()
      const decoder = new TextDecoder()
      let buffer = ''
      let terminal = false
      while (!terminal) {
        const { value, done } = await reader.read()
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done })
        const frames = buffer.split(/\r?\n\r?\n/)
        buffer = frames.pop() || ''
        for (const frame of frames) {
          const parsed = parseSseFrame(frame)
          if (!parsed || parsed.envelope.turn_id !== turnId) continue
          const data = parsed.envelope.data || {}
          if (parsed.eventName === 'tool.started' && data.tool_name === 'web_search') setStatus('正在联网搜索…', true)
          if (parsed.eventName === 'tool.completed' && data.tool_name === 'web_search' && data.status === 'ok') setStatus('已完成联网搜索，正在整理…', true)
          if (parsed.eventName === 'text.delta') bubble.textContent += data.delta || ''
          if (parsed.eventName === 'text.completed' && !bubble.textContent) bubble.textContent = data.text || ''
          if (parsed.eventName === 'tts.requested') speakText(data.text || '', data.voice_style || 'neutral')
          if (parsed.eventName === 'semantic.completed' || parsed.eventName === 'expression.cue' || parsed.eventName === 'sprite.resolved') applyExpression(data)
          terminal = ['turn.completed', 'turn.cancelled', 'turn.failed'].includes(parsed.eventName)
        }
        if (done) break
      }
      if (!terminal) throw new Error('SSE 在终止事件前关闭')
    }
    async function checkCore() {
      try {
        const response = await fetch(coreUrl + '/health')
        if (!response.ok) throw new Error('health ' + response.status)
        const data = await response.json()
        setStatus('Java + DeepSeek ready')
        build.textContent = 'build: ' + data.build_id + ' · RAG ' + data.rag_chunks
      } catch (reason) {
        setStatus('Java runtime offline')
        error.textContent = '无法连接 Java Core（18080）：' + reason.message
      }
    }
    async function sendMessage(message) {
      error.textContent = ''
      send.disabled = true
      setStatus('Meguri is thinking…', true)
      bubble.textContent = ''
      const request = {
        user_id: userId, client_id: 'desktop_pet', session_id: sessionId, message,
        client_capabilities: { text: true, sprite: true, voice: speechEnabled, screen_context: false },
        formal_memory_allowed: false,
      }
      try {
        const createdResponse = await fetch(coreUrl + '/v1/turns', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Idempotency-Key': 'browser-' + Date.now() }, body: JSON.stringify(request),
        })
        if (!createdResponse.ok) throw new Error('turn ' + createdResponse.status)
        const created = await createdResponse.json()
        await followTurn(created.turn_id)
        send.disabled = false
        setStatus('Java + DeepSeek ready')
      } catch (reason) {
        send.disabled = false; setStatus('Java runtime ready'); error.textContent = reason.message || String(reason)
      }
    }
    document.getElementById('form').addEventListener('submit', event => { event.preventDefault(); const message = input.value.trim(); if (!message || send.disabled) return; input.value = ''; sendMessage(message) })
    checkCore()
  </script>
</body>
</html>
